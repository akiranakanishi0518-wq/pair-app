<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>来週の参加投票 | TSUGI HANDS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F8F6F2;
            --text-color: #1A1A1A;
            --accent-color: #C66B4E;
            --sub-accent-color: #F5E6DF;
            --success-color: #4CAF50;
            --inactive-color: #BDBDBD;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .card {
            background-color: var(--white);
            border-radius: 24px;
            padding: 40px 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 {
            color: var(--accent-color);
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-yes {
            background-color: var(--success-color);
            color: white;
        }

        .btn-no {
            background-color: var(--inactive-color);
            color: white;
        }

        .reason-area {
            display: none;
            margin-top: 20px;
            text-align: left;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #DDD;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 8px;
        }

        .btn-submit {
            background-color: var(--accent-color);
            color: white;
            margin-top: 15px;
        }

        #thanks-screen {
            display: none;
        }

        .error-message {
            color: #C62828;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card" id="vote-screen">
        <h1 id="greeting">読み込み中...</h1>
        
        <div id="action-buttons">
            <button class="btn btn-yes" onclick="submitVote('yes')">✅ 参加できる！</button>
            <button class="btn btn-no" onclick="showReasonField()">❌ 今週は難しい</button>
        </div>

        <div id="reason-area" class="reason-area">
            <label>理由（任意）</label>
            <textarea id="reason-input" placeholder="例：テスト期間、部活の大会など"></textarea>
            <button class="btn btn-submit" onclick="submitVote('no')">回答を送信する</button>
        </div>
    </div>

    <div class="card" id="thanks-screen">
        <div style="font-size: 60px; margin-bottom: 20px;">🎉</div>
        <h1>回答ありがとう！</h1>
        <p>あなたの回答を保存しました。<br>今週も楽しもう！</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const memberId = urlParams.get('member');
        
        // localStorage からメンバー情報を取得
        const members = JSON.parse(localStorage.getItem('tsugi_members')) || [];
        const member = members.find(m => m.id === memberId);

        if (!memberId || !member) {
            document.getElementById('greeting').innerHTML = '<span class="error-message">URLが正しくありません</span>';
            document.getElementById('action-buttons').style.display = 'none';
        } else {
            document.getElementById('greeting').textContent = `${member.emoji} ${member.name}さん、来週参加できる？`;
        }

        function showReasonField() {
            document.getElementById('action-buttons').style.display = 'none';
            document.getElementById('reason-area').style.display = 'block';
        }

        function submitVote(answer) {
            const reason = document.getElementById('reason-input').value;
            
            // localStorage に保存
            const votes = JSON.parse(localStorage.getItem('tsugi_votes')) || {};
            votes[memberId] = {
                answer: answer,
                reason: reason,
                timestamp: new Date().getTime()
            };
            localStorage.setItem('tsugi_votes', JSON.stringify(votes));

            // 画面切り替え
            document.getElementById('vote-screen').style.display = 'none';
            document.getElementById('thanks-screen').style.display = 'block';
        }
    </script>
</body>
</html>
