<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>来週の参加投票 | TSUGI HANDS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F8F6F2;
            --text-color: #1A1A1A;
            --accent-color: #C66B4E;
            --sub-accent-color: #F5E6DF;
            --success-color: #4CAF50;
            --inactive-color: #BDBDBD;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .card {
            background-color: var(--white);
            border-radius: 24px;
            padding: 30px 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 {
            color: var(--accent-color);
            font-size: 1.4rem;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        select, textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #EEE;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            background-color: #FAFAFA;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
            transition: opacity 0.2s;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-yes { background-color: var(--success-color); color: white; }
        .btn-no { background-color: var(--inactive-color); color: white; }
        .btn-submit { background-color: var(--accent-color); color: white; margin-top: 10px; }

        .hidden { display: none; }
        #thanks-screen, #expired-screen { display: none; }
    </style>
</head>
<body>

    <div class="card" id="vote-screen">
        <h1>来週の参加投票</h1>
        
        <div class="form-group">
            <label>あなたの名前を選択</label>
            <select id="member-select" onchange="checkSelection()">
                <option value="" disabled selected>選択してください</option>
            </select>
        </div>

        <div id="action-buttons">
            <button id="btn-yes" class="btn btn-yes" onclick="selectAnswer('yes')" disabled>✅ 参加できる！</button>
            <button id="btn-no" class="btn btn-no" onclick="selectAnswer('no')" disabled>❌ 今週は難しい</button>
        </div>

        <div id="final-step" class="hidden">
            <div class="form-group">
                <label id="reason-label">ひとこと（任意）</label>
                <textarea id="reason-input" placeholder="例：楽しみ！、今週は忙しくて..." rows="3"></textarea>
            </div>
            <button class="btn btn-submit" onclick="submitVote()">回答を送信する</button>
            <button class="btn" style="background:none; color:#888; font-size:14px;" onclick="backToSelection()">戻る</button>
        </div>

        <p style="font-size:12px; color:#888; margin-top:20px;">※日曜 24:00 締切</p>
    </div>

    <div class="card" id="thanks-screen">
        <div style="font-size: 60px; margin-bottom: 20px;">🎉</div>
        <h1>回答ありがとう！</h1>
        <p id="thanks-msg">あなたの回答を保存しました。</p>
        <button class="btn" onclick="location.reload()" style="background:#EEE; border-radius:12px; margin-top:20px;">他の人の回答を入力する</button>
    </div>

    <div class="card" id="expired-screen">
        <div style="font-size: 60px; margin-bottom: 20px;">⏰</div>
        <h1>回答期限終了</h1>
        <p>来週の投票受付は終了しました。</p>
    </div>

    <script>
        const KEYS = { MEMBERS: 'tsugi_members', VOTES: 'tsugi_votes' };
        let selectedAnswer = null;

        // localStorageからデータを取得
        const members = JSON.parse(localStorage.getItem(KEYS.MEMBERS)) || [];
        
        // セレクトボックスの初期化
        const select = document.getElementById('member-select');
        members.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m.id;
            opt.textContent = `${m.emoji} ${m.name}`;
            select.appendChild(opt);
        });

        function checkSelection() {
            const val = document.getElementById('member-select').value;
            document.getElementById('btn-yes').disabled = !val;
            document.getElementById('btn-no').disabled = !val;
        }

        function selectAnswer(ans) {
            selectedAnswer = ans;
            document.getElementById('action-buttons').classList.add('hidden');
            document.getElementById('final-step').classList.remove('hidden');
            document.getElementById('reason-label').textContent = ans === 'yes' ? '意気込み・ひとこと（任意）' : 'お休みの理由（任意）';
        }

        function backToSelection() {
            document.getElementById('action-buttons').classList.remove('hidden');
            document.getElementById('final-step').classList.add('hidden');
        }

        function submitVote() {
            const memberId = document.getElementById('member-select').value;
            const reason = document.getElementById('reason-input').value;
            const member = members.find(m => m.id === memberId);
            
            if (!memberId || !selectedAnswer) return;

            // 既存の回答を取得して更新
            const currentVotes = JSON.parse(localStorage.getItem(KEYS.VOTES)) || {};
            currentVotes[memberId] = {
                answer: selectedAnswer,
                reason: reason,
                timestamp: new Date().getTime(),
                name: member ? member.name : 'Unknown'
            };
            localStorage.setItem(KEYS.VOTES, JSON.stringify(currentVotes));

            // 画面切り替え
            document.getElementById('vote-screen').style.display = 'none';
            document.getElementById('thanks-screen').style.display = 'block';
            document.getElementById('thanks-msg').innerHTML = `<b>${member ? member.name : ''}</b> さんの回答を保存しました。<br>ありがとうございます！`;
        }

        // 期限チェック
        window.onload = () => {
            const now = new Date();
            if (now.getDay() === 1) { // 月曜日
                document.getElementById('vote-screen').style.display = 'none';
                document.getElementById('expired-screen').style.display = 'block';
            }
        };
    </script>
</body>
</html>
